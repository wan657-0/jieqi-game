<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>节气小筑·三消风物集 | 消消乐+合成+庭院建造</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #2D4A2A;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
            padding: 12px;
        }

        .game-wrapper {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .match-area {
            background: #FEF7E8;
            border-radius: 32px 32px 24px 24px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 1px solid #D4C9A3;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .score-board {
            background: #4F6D3C;
            padding: 8px 16px;
            border-radius: 40px;
            color: #FEF0CF;
            font-size: 14px;
        }

        .score-board span {
            font-size: 20px;
            font-weight: bold;
        }

        .season-badge {
            background: #8D6A52;
            padding: 6px 14px;
            border-radius: 40px;
            color: #FEF0CF;
            font-size: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            background: #E8DCC8;
            padding: 12px;
            border-radius: 24px;
            margin-bottom: 12px;
        }

        .cell {
            aspect-ratio: 1;
            background: #FFF8F0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            border: 2px solid #D4C0A0;
        }

        .cell.selected {
            border: 3px solid #FFB347;
            background: #FFFAE6;
            transform: scale(0.97);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .resources {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .resource {
            background: #F5EBD8;
            border-radius: 40px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        .craft-area {
            background: #FFF8F0;
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #E8DCD0;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #7B5A42;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #C9AF93;
            padding-left: 12px;
        }

        .decor-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .decor-card {
            background: #F4EDE4;
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            width: calc(33.33% - 8px);
            border: 1px solid #E2D4C4;
        }

        .decor-emoji {
            font-size: 32px;
        }

        .decor-name {
            font-size: 11px;
            margin: 4px 0;
        }

        .decor-cost {
            font-size: 10px;
            color: #A57C4C;
        }

        .decor-count {
            font-size: 12px;
            color: #8DAA6E;
            font-weight: bold;
            margin: 4px 0;
        }

        .craft-btn {
            background: #C9AF93;
            border: none;
            padding: 6px 0;
            border-radius: 40px;
            color: white;
            font-size: 11px;
            width: 100%;
            cursor: pointer;
            margin-top: 6px;
        }

        .craft-btn:active {
            transform: scale(0.96);
        }

        .yard-area {
            background: #DDE2C6;
            border-radius: 28px;
            padding: 16px;
            text-align: center;
            background-image: radial-gradient(circle at 20% 40%, rgba(160,140,80,0.15) 2%, transparent 2.5%);
            background-size: 24px 24px;
        }

        .yard-preview {
            background: #C8D8B0;
            border-radius: 20px;
            padding: 20px;
            min-height: 140px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 32px;
        }

        .yard-name {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #5C6E4A;
        }

        .yard-upgrade-cost {
            background: #EFE6D4;
            border-radius: 20px;
            padding: 12px;
            margin: 12px 0;
            font-size: 13px;
        }

        .build-btn {
            background: #8DAA6E;
            margin-top: 8px;
            padding: 12px;
            border-radius: 40px;
            border: none;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
        }

        .build-btn:active {
            transform: scale(0.98);
        }

        .message {
            background: #2C2A24E6;
            color: #F7ECC7;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- 消消乐区域 -->
    <div class="match-area">
        <div class="game-header">
            <div class="score-board">🎯 连击得分 <span id="matchScore">0</span></div>
            <div class="season-badge" id="seasonHint">🌱 立春 · 消消乐采风物</div>
        </div>
        <div class="grid" id="gameGrid"></div>
        <div class="resources">
            <div class="resource">🌸 <span id="petalCount">0</span></div>
            <div class="resource">💧 <span id="waterCount">0</span></div>
            <div class="resource">🍂 <span id="leafCount">0</span></div>
            <div class="resource">❄️ <span id="snowCount">0</span></div>
        </div>
    </div>

    <!-- 合成装饰区域（消耗风物，获得装饰品） -->
    <div class="craft-area">
        <div class="section-title">🏺 风物工坊 · 合成装饰（消耗品）</div>
        <div class="decor-grid" id="decorGrid"></div>
        <div style="font-size: 11px; color: #A57C4C; text-align: center; margin-top: 8px;">
            💡 装饰品是消耗品，升级庭院会消耗掉它们
        </div>
    </div>

    <!-- 庭院建造区域 -->
    <div class="yard-area">
        <div class="section-title" style="border-left-color: #8DAA6E;">🏡 我的小院 · 消耗装饰升级</div>
        <div class="yard-preview" id="yardPreview">🎑 🏠</div>
        <div class="yard-name" id="yardName">初晴小院 · Lv.0</div>
        
        <div class="yard-upgrade-cost" id="upgradeCostInfo">
            📋 下一级需要：待解锁
        </div>
        
        <button class="build-btn" id="buildYardBtn">🔨 消耗装饰 · 升级庭院 🔨</button>
        <div class="message" id="gameMsg">👆 点击相邻风物消除 → 收集材料 → 合成装饰 → 消耗装饰升级庭院</div>
    </div>
</div>

<script>
    // ==================== 游戏配置 ====================
    const ELEMENTS = ['🌸', '💧', '🍂', '❄️'];
    
    // 装饰配方（消耗风物获得装饰品）
    const DECOR_RECIPES = [
        { id: 0, name: "石灯笼", emoji: "🏮", cost: { petal: 2, water: 1, leaf: 0, snow: 0 } },
        { id: 1, name: "青石凳", emoji: "🪑", cost: { petal: 0, water: 0, leaf: 2, snow: 1 } },
        { id: 2, name: "花架", emoji: "🌸", cost: { petal: 3, water: 1, leaf: 1, snow: 0 } },
        { id: 3, name: "小水景", emoji: "⛲", cost: { petal: 0, water: 3, leaf: 0, snow: 2 } },
        { id: 4, name: "竹灯", emoji: "🎋", cost: { petal: 1, water: 1, leaf: 2, snow: 0 } },
        { id: 5, name: "石塔", emoji: "🗿", cost: { petal: 2, water: 2, leaf: 1, snow: 1 } }
    ];
    
    // 庭院等级 - 每次升级需要消耗指定数量的装饰品（消耗品！）
    const YARD_LEVELS = [
        { id: 0, name: "初晴小院", icon: "🎑", need: {}, unlocked: true },
        { id: 1, name: "花间小筑", icon: "🌷", need: { 0: 1 }, unlocked: false },        // 需要1个石灯笼
        { id: 2, name: "清风庭院", icon: "🍃", need: { 0: 1, 1: 1 }, unlocked: false },   // 石灯笼+青石凳各1
        { id: 3, name: "雅集别院", icon: "🏮", need: { 0: 2, 1: 1, 2: 1 }, unlocked: false },
        { id: 4, name: "云水仙境", icon: "🏯", need: { 0: 2, 1: 2, 2: 1, 3: 1 }, unlocked: false },
        { id: 5, name: "桃源秘境", icon: "🌸", need: { 0: 3, 1: 2, 2: 2, 3: 1, 4: 1 }, unlocked: false },
        { id: 6, name: "蓬莱仙阁", icon: "⛩️", need: { 0: 3, 1: 3, 2: 2, 3: 2, 4: 1, 5: 1 }, unlocked: false }
    ];
    
    // 游戏状态
    let gameState = {
        // 风物资源
        petal: 8,
        water: 6,
        leaf: 5,
        snow: 4,
        // 消消乐
        grid: [],
        rows: 6,
        cols: 6,
        selectedRow: -1,
        selectedCol: -1,
        matchScore: 0,
        // 拥有的装饰品数量（消耗品，可累积）
        ownedDecors: [0, 0, 0, 0, 0, 0],
        // 当前庭院等级
        currentYardLevel: 0
    };
    
    // ==================== 消消乐核心逻辑 ====================
    function initGrid() {
        let newGrid = [];
        for (let i = 0; i < gameState.rows; i++) {
            newGrid[i] = [];
            for (let j = 0; j < gameState.cols; j++) {
                newGrid[i][j] = Math.floor(Math.random() * ELEMENTS.length);
            }
        }
        while (clearMatchesAndDrop(newGrid, true)) {}
        return newGrid;
    }
    
    function getMatches(grid) {
        let matches = [];
        // 水平匹配
        for (let i = 0; i < gameState.rows; i++) {
            let count = 1;
            for (let j = 1; j < gameState.cols; j++) {
                if (grid[i][j] === grid[i][j-1] && grid[i][j] !== -1) {
                    count++;
                } else {
                    if (count >= 3) {
                        for (let k = j - count; k < j; k++) matches.push([i, k]);
                    }
                    count = 1;
                }
            }
            if (count >= 3) {
                for (let k = gameState.cols - count; k < gameState.cols; k++) matches.push([i, k]);
            }
        }
        // 垂直匹配
        for (let j = 0; j < gameState.cols; j++) {
            let count = 1;
            for (let i = 1; i < gameState.rows; i++) {
                if (grid[i][j] === grid[i-1][j] && grid[i][j] !== -1) {
                    count++;
                } else {
                    if (count >= 3) {
                        for (let k = i - count; k < i; k++) matches.push([k, j]);
                    }
                    count = 1;
                }
            }
            if (count >= 3) {
                for (let k = gameState.rows - count; k < gameState.rows; k++) matches.push([k, j]);
            }
        }
        return matches;
    }
    
    function clearMatchesAndDrop(grid, isInit = false) {
        let matches = getMatches(grid);
        if (matches.length === 0) return false;
        
        let rewards = [0, 0, 0, 0];
        for (let [i, j] of matches) {
            let type = grid[i][j];
            if (type !== -1 && type >= 0) {
                rewards[type]++;
            }
            grid[i][j] = -1;
        }
        
        if (!isInit) {
            gameState.petal += rewards[0];
            gameState.water += rewards[1];
            gameState.leaf += rewards[2];
            gameState.snow += rewards[3];
            let total = rewards[0]+rewards[1]+rewards[2]+rewards[3];
            gameState.matchScore += total;
            showMsg(`🎉 消除 +${total} 风物！获得 ${rewards[0]}🌸 ${rewards[1]}💧 ${rewards[2]}🍂 ${rewards[3]}❄️`);
        }
        
        // 掉落新块
        for (let j = 0; j < gameState.cols; j++) {
            let columnValues = [];
            for (let i = gameState.rows - 1; i >= 0; i--) {
                if (grid[i][j] !== -1) {
                    columnValues.push(grid[i][j]);
                }
            }
            while (columnValues.length < gameState.rows) {
                columnValues.push(Math.floor(Math.random() * ELEMENTS.length));
            }
            columnValues.reverse();
            for (let i = 0; i < gameState.rows; i++) {
                grid[i][j] = columnValues[i];
            }
        }
        
        clearMatchesAndDrop(grid, isInit);
        return true;
    }
    
    function trySwap(r1, c1, r2, c2) {
        if (r1 < 0 || r1 >= gameState.rows || c1 < 0 || c1 >= gameState.cols) return false;
        if (r2 < 0 || r2 >= gameState.rows || c2 < 0 || c2 >= gameState.cols) return false;
        
        let grid = gameState.grid;
        let temp = grid[r1][c1];
        grid[r1][c1] = grid[r2][c2];
        grid[r2][c2] = temp;
        
        let matches = getMatches(grid);
        if (matches.length > 0) {
            clearMatchesAndDrop(grid, false);
            updateUI();
            return true;
        } else {
            temp = grid[r1][c1];
            grid[r1][c1] = grid[r2][c2];
            grid[r2][c2] = temp;
            showMsg("🌱 这样无法收集风物，再试试吧~");
            return false;
        }
    }
    
    // ==================== 合成装饰（消耗风物，增加装饰品数量） ====================
    function canCraftDecor(decor) {
        let cost = decor.cost;
        if (cost.petal && gameState.petal < cost.petal) return false;
        if (cost.water && gameState.water < cost.water) return false;
        if (cost.leaf && gameState.leaf < cost.leaf) return false;
        if (cost.snow && gameState.snow < cost.snow) return false;
        return true;
    }
    
    function craftDecor(decorId) {
        let decor = DECOR_RECIPES[decorId];
        if (!canCraftDecor(decor)) {
            showMsg(`材料不足，无法合成${decor.name}`);
            return false;
        }
        let cost = decor.cost;
        if (cost.petal) gameState.petal -= cost.petal;
        if (cost.water) gameState.water -= cost.water;
        if (cost.leaf) gameState.leaf -= cost.leaf;
        if (cost.snow) gameState.snow -= cost.snow;
        
        // 装饰品数量+1（可累积，用于后续消耗升级）
        gameState.ownedDecors[decorId]++;
        
        showMsg(`✨ 合成成功！获得「${decor.name}」${decor.emoji} ×${gameState.ownedDecors[decorId]}`);
        updateUI();
        return true;
    }
    
    // ==================== 消耗装饰品升级庭院 ====================
    function upgradeYard() {
        let nextLevelIndex = gameState.currentYardLevel + 1;
        if (nextLevelIndex >= YARD_LEVELS.length) {
            showMsg("🏆 已达最高级庭院！感谢陪伴~");
            return;
        }
        
        let nextLevel = YARD_LEVELS[nextLevelIndex];
        let canUpgrade = true;
        let missing = [];
        
        // 检查是否拥有足够数量的装饰品（消耗品检查）
        for (let [decorId, needCount] of Object.entries(nextLevel.need)) {
            let owned = gameState.ownedDecors[parseInt(decorId)] || 0;
            if (owned < needCount) {
                canUpgrade = false;
                let decorName = DECOR_RECIPES[parseInt(decorId)].name;
                missing.push(`${decorName} 需要${needCount}个，当前${owned}个`);
            }
        }
        
        if (!canUpgrade) {
            showMsg(`🔒 装饰品不足：${missing.join('、')}。先去工坊合成吧！`);
            return;
        }
        
        // 消耗装饰品！
        for (let [decorId, needCount] of Object.entries(nextLevel.need)) {
            gameState.ownedDecors[parseInt(decorId)] -= needCount;
        }
        
        // 升级庭院
        gameState.currentYardLevel = nextLevelIndex;
        nextLevel.unlocked = true;
        
        showMsg(`🎉🎉🎉 消耗装饰成功！庭院升级为「${nextLevel.name}」！`);
        updateUI();
    }
    
    // ==================== UI 渲染 ====================
    function renderGrid() {
        let gridContainer = document.getElementById('gameGrid');
        gridContainer.innerHTML = '';
        for (let i = 0; i < gameState.rows; i++) {
            for (let j = 0; j < gameState.cols; j++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                if (gameState.selectedRow === i && gameState.selectedCol === j) {
                    cell.classList.add('selected');
                }
                let type = gameState.grid[i][j];
                cell.textContent = ELEMENTS[type];
                cell.addEventListener('click', (function(r,c) {
                    return function() { onCellClick(r,c); };
                })(i,j));
                gridContainer.appendChild(cell);
            }
        }
    }
    
    function onCellClick(row, col) {
        if (gameState.selectedRow === -1) {
            gameState.selectedRow = row;
            gameState.selectedCol = col;
        } else {
            let dr = Math.abs(row - gameState.selectedRow);
            let dc = Math.abs(col - gameState.selectedCol);
            if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                trySwap(gameState.selectedRow, gameState.selectedCol, row, col);
            } else {
                showMsg("👆 只能交换相邻的风物哦~");
            }
            gameState.selectedRow = -1;
            gameState.selectedCol = -1;
        }
        renderGrid();
        updateResources();
    }
    
    function updateResources() {
        document.getElementById('petalCount').innerText = gameState.petal;
        document.getElementById('waterCount').innerText = gameState.water;
        document.getElementById('leafCount').innerText = gameState.leaf;
        document.getElementById('snowCount').innerText = gameState.snow;
        document.getElementById('matchScore').innerText = gameState.matchScore;
    }
    
    function renderDecors() {
        let container = document.getElementById('decorGrid');
        container.innerHTML = '';
        DECOR_RECIPES.forEach((decor, idx) => {
            let ownedCount = gameState.ownedDecors[idx] || 0;
            let costText = [];
            if (decor.cost.petal) costText.push(`🌸×${decor.cost.petal}`);
            if (decor.cost.water) costText.push(`💧×${decor.cost.water}`);
            if (decor.cost.leaf) costText.push(`🍂×${decor.cost.leaf}`);
            if (decor.cost.snow) costText.push(`❄️×${decor.cost.snow}`);
            
            let card = document.createElement('div');
            card.className = 'decor-card';
            card.innerHTML = `
                <div class="decor-emoji">${decor.emoji}</div>
                <div class="decor-name">${decor.name}</div>
                <div class="decor-cost">${costText.join(' ')}</div>
                <div class="decor-count">📦 拥有 ×${ownedCount}</div>
                <button class="craft-btn" data-id="${idx}">🔨 合成</button>
            `;
            container.appendChild(card);
        });
        
        document.querySelectorAll('.craft-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = parseInt(btn.dataset.id);
                craftDecor(id);
                e.stopPropagation();
            });
        });
    }
    
    function renderYard() {
        let yard = YARD_LEVELS[gameState.currentYardLevel];
        document.getElementById('yardName').innerHTML = `${yard.name} · Lv.${gameState.currentYardLevel}`;
        
        // 预览图标
        let previewHtml = yard.icon + ' ';
        for (let i = 0; i < gameState.currentYardLevel; i++) {
            previewHtml += '🏠';
        }
        document.getElementById('yardPreview').innerHTML = previewHtml;
        
        // 显示下一级升级需要消耗的装饰品
        let nextLevelIndex = gameState.currentYardLevel + 1;
        if (nextLevelIndex < YARD_LEVELS.length) {
            let nextLevel = YARD_LEVELS[nextLevelIndex];
            let needText = [];
            for (let [decorId, needCount] of Object.entries(nextLevel.need)) {
                let decorName = DECOR_RECIPES[parseInt(decorId)].name;
                let owned = gameState.ownedDecors[parseInt(decorId)] || 0;
                needText.push(`${decorName} ${owned}/${needCount}`);
            }
            document.getElementById('upgradeCostInfo').innerHTML = `📋 升级到「${nextLevel.name}」需要消耗：<br>${needText.join(' · ')}`;
        } else {
            document.getElementById('upgradeCostInfo').innerHTML = `🏆 已达最高级！感谢建造大师`;
        }
    }
    
    function showMsg(msg) {
        let msgDiv = document.getElementById('gameMsg');
        msgDiv.innerHTML = `🍃 ${msg}`;
        setTimeout(() => {
            if (document.getElementById('gameMsg').innerHTML === `🍃 ${msg}`) {
                document.getElementById('gameMsg').innerHTML = '👆 消消乐采风物 → 合成装饰 → 消耗装饰升级庭院';
            }
        }, 3000);
    }
    
    function updateSeason() {
        let now = new Date();
        let month = now.getMonth() + 1;
        let seasonText = "🌱 立春 · 消消乐采风物";
        if (month >= 3 && month <= 5) seasonText = "🌸 春日踏青 · 消消乐采风物";
        else if (month >= 6 && month <= 8) seasonText = "🌞 夏日荷香 · 消消乐采风物";
        else if (month >= 9 && month <= 11) seasonText = "🍂 秋日拾叶 · 消消乐采风物";
        else seasonText = "❄️ 冬日赏雪 · 消消乐采风物";
        document.getElementById('seasonHint').innerHTML = seasonText;
    }
    
    function updateUI() {
        updateResources();
        renderDecors();
        renderYard();
        renderGrid();
    }
    
    function initGame() {
        gameState.grid = initGrid();
        gameState.selectedRow = -1;
        gameState.selectedCol = -1;
        gameState.matchScore = 0;
        gameState.petal = 10;
        gameState.water = 8;
        gameState.leaf = 6;
        gameState.snow = 5;
        gameState.ownedDecors = [0, 0, 0, 0, 0, 0];
        gameState.currentYardLevel = 0;
        
        for (let i = 1; i < YARD_LEVELS.length; i++) {
            YARD_LEVELS[i].unlocked = false;
        }
        YARD_LEVELS[0].unlocked = true;
        
        updateSeason();
        updateUI();
        
        document.getElementById('buildYardBtn').onclick = () => upgradeYard();
    }
    
    initGame();
</script>
</body>
</html>
